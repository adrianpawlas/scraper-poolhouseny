name: Pool House NY Scraper

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Limit number of products (optional)'
        required: false
        default: ''
  schedule:
    - cron: '0 13 * * 0'  # Sunday at 1 PM
    - cron: '0 13 * * 4'  # Thursday at 1 PM

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          python -m playwright install chromium
          python -m playwright install-deps

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            python main.py --limit ${{ github.event.inputs.limit }}
          else
            python main.py

      - name: Upload output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: products-output
          path: products_output.json
          products_with_embeddings.json